<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Greybox Fuzzer Architecture</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Segoe UI', sans-serif; }
  </style>
</head>
<body>
<svg width="860" height="540" viewBox="0 0 860 540" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff6b35"/>
    </marker>
    <marker id="arrow-grey" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8888aa"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="860" height="540" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="430" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#ff6b35" font-family="'Segoe UI', sans-serif" filter="url(#glow)">Greybox Fuzzer Architecture</text>
  <text x="430" y="58" text-anchor="middle" font-size="12" fill="#8888aa" font-family="'Segoe UI', sans-serif">SWEN438 A3 · Java · ASM Bytecode Instrumentation</text>
  <line x1="80" y1="68" x2="780" y2="68" stroke="#ff6b35" stroke-width="1" opacity="0.3"/>

  <!-- ===== JAVA AGENT LAYER (top band) ===== -->
  <rect x="30" y="82" width="800" height="90" rx="10" fill="#0d0d1a" stroke="#ff6b35" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.9"/>
  <text x="55" y="100" font-size="11" fill="#ff6b35" font-family="'Segoe UI', sans-serif" font-weight="600">JAVA AGENT LAYER  (fuzz-agent.jar)</text>

  <!-- FuzzAgent box -->
  <rect x="50" y="108" width="160" height="54" rx="8" fill="#2a2a4e" stroke="#ff6b35" stroke-width="1.2"/>
  <text x="130" y="128" text-anchor="middle" font-size="12" fill="#ff6b35" font-family="'Segoe UI', sans-serif" font-weight="600">FuzzAgent</text>
  <text x="130" y="144" text-anchor="middle" font-size="10" fill="#ccccdd" font-family="'Segoe UI', sans-serif">premain / agentmain</text>
  <text x="130" y="157" text-anchor="middle" font-size="10" fill="#8888aa" font-family="'Segoe UI', sans-serif">VirtualMachine.attach()</text>

  <!-- ChipTransformer box -->
  <rect x="240" y="108" width="170" height="54" rx="8" fill="#2a2a4e" stroke="#ff6b35" stroke-width="1.2"/>
  <text x="325" y="128" text-anchor="middle" font-size="12" fill="#ff6b35" font-family="'Segoe UI', sans-serif" font-weight="600">ChipTransformer</text>
  <text x="325" y="144" text-anchor="middle" font-size="10" fill="#ccccdd" font-family="'Segoe UI', sans-serif">ASM ClassVisitor</text>
  <text x="325" y="157" text-anchor="middle" font-size="10" fill="#8888aa" font-family="'Segoe UI', sans-serif">Injects onMove() hooks</text>

  <!-- StateStore box -->
  <rect x="440" y="108" width="165" height="54" rx="8" fill="#2a2a4e" stroke="#ff6b35" stroke-width="1.2"/>
  <text x="522" y="128" text-anchor="middle" font-size="12" fill="#ff6b35" font-family="'Segoe UI', sans-serif" font-weight="600">StateStore</text>
  <text x="522" y="144" text-anchor="middle" font-size="10" fill="#ccccdd" font-family="'Segoe UI', sans-serif">Coverage signatures</text>
  <text x="522" y="157" text-anchor="middle" font-size="10" fill="#8888aa" font-family="'Segoe UI', sans-serif">Crash queue + key mask</text>

  <!-- Chip.class badge -->
  <rect x="635" y="108" width="175" height="54" rx="8" fill="#1e1e3a" stroke="#555577" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="722" y="126" text-anchor="middle" font-size="11" fill="#8888aa" font-family="'Segoe UI', sans-serif" font-style="italic">Chip.class</text>
  <text x="722" y="142" text-anchor="middle" font-size="10" fill="#8888aa" font-family="'Segoe UI', sans-serif">(closed-source)</text>
  <text x="722" y="156" text-anchor="middle" font-size="10" fill="#8888aa" font-family="'Segoe UI', sans-serif">moveLeft/Right/Up/Down</text>

  <!-- Arrows in agent layer -->
  <line x1="210" y1="135" x2="238" y2="135" stroke="#ff6b35" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="410" y1="135" x2="438" y2="135" stroke="#ff6b35" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="605" y1="135" x2="633" y2="135" stroke="#ff6b35" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <text x="415" y="130" font-size="9" fill="#8888aa" font-family="'Segoe UI', sans-serif">records</text>
  <text x="608" y="130" font-size="9" fill="#8888aa" font-family="'Segoe UI', sans-serif">retransform</text>

  <!-- ===== FUZZING LOOP ===== -->
  <text x="430" y="200" text-anchor="middle" font-size="11" fill="#ff6b35" font-family="'Segoe UI', sans-serif" font-weight="600">── FUZZING LOOP ──</text>

  <!-- Nodes for the loop -->
  <!-- Seed Corpus -->
  <rect x="30" y="215" width="130" height="56" rx="8" fill="#2a2a4e" stroke="#555577" stroke-width="1.2"/>
  <text x="95" y="237" text-anchor="middle" font-size="12" fill="#ffffff" font-family="'Segoe UI', sans-serif" font-weight="600">Seed Corpus</text>
  <text x="95" y="252" text-anchor="middle" font-size="10" fill="#8888aa" font-family="'Segoe UI', sans-serif">Move sequences</text>
  <text x="95" y="264" text-anchor="middle" font-size="10" fill="#8888aa" font-family="'Segoe UI', sans-serif">["", "LR", "LLUD"…]</text>

  <!-- Mutation -->
  <rect x="195" y="215" width="130" height="56" rx="8" fill="#2a2a4e" stroke="#555577" stroke-width="1.2"/>
  <text x="260" y="237" text-anchor="middle" font-size="12" fill="#ffffff" font-family="'Segoe UI', sans-serif" font-weight="600">Mutation</text>
  <text x="260" y="252" text-anchor="middle" font-size="10" fill="#8888aa" font-family="'Segoe UI', sans-serif">randomMove()</text>
  <text x="260" y="264" text-anchor="middle" font-size="10" fill="#8888aa" font-family="'Segoe UI', sans-serif">append L/R/U/D</text>

  <!-- Execution -->
  <rect x="360" y="215" width="130" height="56" rx="8" fill="#2a2a4e" stroke="#555577" stroke-width="1.2"/>
  <text x="425" y="237" text-anchor="middle" font-size="12" fill="#ffffff" font-family="'Segoe UI', sans-serif" font-weight="600">Execution</text>
  <text x="425" y="252" text-anchor="middle" font-size="10" fill="#8888aa" font-family="'Segoe UI', sans-serif">Chip.moveLeft/Right</text>
  <text x="425" y="264" text-anchor="middle" font-size="10" fill="#8888aa" font-family="'Segoe UI', sans-serif">Up/Down → JVM</text>

  <!-- Coverage Tracking -->
  <rect x="525" y="215" width="140" height="56" rx="8" fill="#2a2a4e" stroke="#555577" stroke-width="1.2"/>
  <text x="595" y="237" text-anchor="middle" font-size="12" fill="#ffffff" font-family="'Segoe UI', sans-serif" font-weight="600">Coverage</text>
  <text x="595" y="252" text-anchor="middle" font-size="10" fill="#8888aa" font-family="'Segoe UI', sans-serif">StateStore.getState</text>
  <text x="595" y="264" text-anchor="middle" font-size="10" fill="#8888aa" font-family="'Segoe UI', sans-serif">Signature() + keyMask</text>

  <!-- Crash Detection -->
  <rect x="700" y="215" width="130" height="56" rx="8" fill="#3a1a1a" stroke="#ff4444" stroke-width="1.4"/>
  <text x="765" y="237" text-anchor="middle" font-size="12" fill="#ff6b6b" font-family="'Segoe UI', sans-serif" font-weight="600">Crash Detection</text>
  <text x="765" y="252" text-anchor="middle" font-size="10" fill="#aa8888" font-family="'Segoe UI', sans-serif">onMoveException()</text>
  <text x="765" y="264" text-anchor="middle" font-size="10" fill="#aa8888" font-family="'Segoe UI', sans-serif">x,y,ExceptionClass</text>

  <!-- Arrows in fuzzing loop (horizontal) -->
  <line x1="160" y1="243" x2="193" y2="243" stroke="#ff6b35" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="325" y1="243" x2="358" y2="243" stroke="#ff6b35" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="490" y1="243" x2="523" y2="243" stroke="#ff6b35" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="665" y1="243" x2="698" y2="243" stroke="#ff6b35" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- ===== BOTTOM SECTION ===== -->
  <!-- Corpus Update -->
  <rect x="195" y="340" width="130" height="50" rx="8" fill="#1a2a1a" stroke="#44aa44" stroke-width="1.2"/>
  <text x="260" y="362" text-anchor="middle" font-size="12" fill="#88cc88" font-family="'Segoe UI', sans-serif" font-weight="600">Corpus Update</text>
  <text x="260" y="377" text-anchor="middle" font-size="10" fill="#668866" font-family="'Segoe UI', sans-serif">New state → add seed</text>

  <!-- Results File -->
  <rect x="525" y="340" width="140" height="50" rx="8" fill="#1a1a2a" stroke="#4444aa" stroke-width="1.2"/>
  <text x="595" y="362" text-anchor="middle" font-size="12" fill="#8888cc" font-family="'Segoe UI', sans-serif" font-weight="600">Results File</text>
  <text x="595" y="377" text-anchor="middle" font-size="10" fill="#666688" font-family="'Segoe UI', sans-serif">crashes.csv (on-the-fly)</text>

  <!-- Arrow: Coverage → Corpus Update (down) -->
  <line x1="595" y1="271" x2="595" y2="310" stroke="#8888aa" stroke-width="1.4" marker-end="url(#arrow-grey)"/>
  <line x1="595" y1="310" x2="262" y2="310" stroke="#8888aa" stroke-width="1.4"/>
  <line x1="262" y1="310" x2="262" y2="338" stroke="#8888aa" stroke-width="1.4" marker-end="url(#arrow-grey)"/>
  <text x="428" y="305" text-anchor="middle" font-size="9" fill="#8888aa" font-family="'Segoe UI', sans-serif">new state visited?</text>

  <!-- Arrow: Corpus Update → Seed Corpus (loop back) -->
  <line x1="195" y1="365" x2="95" y2="365" stroke="#44aa44" stroke-width="1.4" marker-end="url(#arrow-grey)"/>
  <line x1="95" y1="365" x2="95" y2="271" stroke="#44aa44" stroke-width="1.4" marker-end="url(#arrow-grey)"/>
  <text x="60" y="340" font-size="9" fill="#44aa44" font-family="'Segoe UI', sans-serif">add to</text>
  <text x="60" y="352" font-size="9" fill="#44aa44" font-family="'Segoe UI', sans-serif">corpus</text>

  <!-- Arrow: Crash Detection → Results File -->
  <line x1="765" y1="271" x2="765" y2="310" stroke="#ff4444" stroke-width="1.4" marker-end="url(#arrow-grey)"/>
  <line x1="765" y1="310" x2="667" y2="310" stroke="#ff4444" stroke-width="1.4"/>
  <line x1="667" y1="310" x2="667" y2="338" stroke="#ff4444" stroke-width="1.4" marker-end="url(#arrow-grey)"/>
  <text x="720" y="305" text-anchor="middle" font-size="9" fill="#ff6b6b" font-family="'Segoe UI', sans-serif">write crash</text>

  <!-- Arrow: Agent layer injects into Execution -->
  <line x1="425" y1="162" x2="425" y2="213" stroke="#ff6b35" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <text x="436" y="192" font-size="9" fill="#ff6b35" font-family="'Segoe UI', sans-serif">hook</text>

  <!-- Arrow: StateStore → Coverage (dashed) -->
  <line x1="522" y1="162" x2="580" y2="213" stroke="#ff6b35" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arrow)"/>

  <!-- Reset arrow (at bottom) -->
  <text x="430" y="430" text-anchor="middle" font-size="10" fill="#8888aa" font-family="'Segoe UI', sans-serif">chip.reset() on crash or randomly (~1% of iterations) to vary exploration paths</text>

  <!-- Legend -->
  <rect x="30" y="455" width="800" height="72" rx="8" fill="#111122" stroke="#333355" stroke-width="1"/>
  <text x="50" y="475" font-size="11" fill="#ff6b35" font-family="'Segoe UI', sans-serif" font-weight="600">Key Techniques</text>
  <line x1="50" y1="482" x2="50" y2="482"/>

  <rect x="50" y="485" width="10" height="10" rx="2" fill="#ff6b35"/>
  <text x="68" y="495" font-size="10" fill="#ccccdd" font-family="'Segoe UI', sans-serif">ASM AdviceAdapter — bytecode hooks injected into moveLeft/Right/Up/Down at JVM level</text>

  <rect x="50" y="503" width="10" height="10" rx="2" fill="#44aa44"/>
  <text x="68" y="513" font-size="10" fill="#ccccdd" font-family="'Segoe UI', sans-serif">Coverage-guided corpus growth — new state signatures trigger seed retention</text>

  <rect x="430" y="485" width="10" height="10" rx="2" fill="#ff4444"/>
  <text x="448" y="495" font-size="10" fill="#ccccdd" font-family="'Segoe UI', sans-serif">Crash deduplication — unique (x, y, ExceptionClass) tuples written on-the-fly</text>

  <rect x="430" y="503" width="10" height="10" rx="2" fill="#4444aa"/>
  <text x="448" y="513" font-size="10" fill="#ccccdd" font-family="'Segoe UI', sans-serif">Closed-source target — Chip's Challenge game instrumented without source access</text>
</svg>
</body>
</html>
